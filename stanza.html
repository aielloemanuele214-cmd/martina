<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0708">
<title>Una stanza tutta per voi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --crema:#FBF3E9; --pesca:#F6C9A8; --corallo:#E8896B;
    --rosa:#C65B7C; --prugna:#5E2A47; --rosaluce:#E890A8;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#0a0708;overflow:hidden;overscroll-behavior:none;
    font-family:'Nunito',system-ui,sans-serif;touch-action:none;
    -webkit-user-select:none;user-select:none}
  #game{position:fixed;inset:0;width:100%;height:100%;display:block}

  /* ---------- HUD ---------- */
  #hearts{position:fixed;top:calc(10px + env(safe-area-inset-top));left:14px;z-index:30;
    font-size:17px;letter-spacing:3px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));
    pointer-events:none}
  #hearts .off{opacity:.28;filter:grayscale(1)}
  #btns{position:fixed;top:calc(8px + env(safe-area-inset-top));right:12px;z-index:30;display:flex;gap:8px}
  #btns button{width:40px;height:40px;border-radius:12px;border:1px solid rgba(246,201,168,.35);
    background:rgba(30,16,20,.62);color:var(--crema);font-size:18px;cursor:pointer;
    backdrop-filter:blur(4px)}
  #btns button:active{transform:scale(.93)}
  #hint{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    z-index:30;background:rgba(30,16,20,.72);color:var(--crema);border:1px solid rgba(246,201,168,.3);
    padding:9px 16px;border-radius:999px;font-size:13.5px;white-space:nowrap;
    transition:opacity 1.2s;pointer-events:none;backdrop-filter:blur(4px)}
  #hint.hide{opacity:0}

  /* ---------- Bottone azione ---------- */
  #action{position:fixed;right:calc(20px + env(safe-area-inset-right));
    bottom:calc(26px + env(safe-area-inset-bottom));z-index:30;
    width:64px;height:64px;border-radius:50%;border:2px solid rgba(251,243,233,.75);
    background:radial-gradient(circle at 32% 28%, #f0996f, var(--corallo) 60%, #c96a4e);
    color:#fff;font-size:26px;cursor:pointer;display:none;align-items:center;justify-content:center;
    box-shadow:0 4px 18px rgba(0,0,0,.5), 0 0 0 0 rgba(232,137,107,.55);
    animation:pulse 1.6s infinite}
  #action.show{display:flex}
  #action:active{transform:scale(.92)}
  @keyframes pulse{
    0%{box-shadow:0 4px 18px rgba(0,0,0,.5), 0 0 0 0 rgba(232,137,107,.55)}
    70%{box-shadow:0 4px 18px rgba(0,0,0,.5), 0 0 0 16px rgba(232,137,107,0)}
    100%{box-shadow:0 4px 18px rgba(0,0,0,.5), 0 0 0 0 rgba(232,137,107,0)}
  }

  /* ---------- Dialogo (stile Pokémon) ---------- */
  #dialog{position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(14px + env(safe-area-inset-bottom));width:min(620px, calc(100vw - 24px));
    z-index:40;background:rgba(30,14,22,.93);border:2px solid var(--pesca);border-radius:14px;
    padding:14px 18px 16px;color:var(--crema);display:none;cursor:pointer;
    box-shadow:0 8px 30px rgba(0,0,0,.6)}
  #dialog.show{display:block}
  #dialog .name{display:inline-block;background:var(--corallo);color:#fff;font-weight:800;
    font-family:'Baloo 2',cursive;font-size:13px;padding:2px 12px;border-radius:999px;
    margin-bottom:7px;letter-spacing:.5px}
  #dialog .text{font-size:15.5px;line-height:1.55;min-height:44px}
  #dialog .next{position:absolute;right:14px;bottom:8px;color:var(--pesca);
    animation:bob 1s infinite;font-size:13px}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}

  /* ---------- Modale sorpresa ---------- */
  #veil{position:fixed;inset:0;background:rgba(10,5,8,.55);backdrop-filter:blur(3px);
    z-index:50;display:none;align-items:center;justify-content:center;padding:18px}
  #veil.show{display:flex}
  #card{background:var(--crema);border:3px solid var(--corallo);border-radius:20px;
    width:min(440px, 100%);max-height:min(86vh, 86dvh);overflow-y:auto;text-align:center;
    padding:26px 24px 22px;box-shadow:0 20px 60px rgba(0,0,0,.55);
    animation:pop .3s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{from{transform:scale(.75);opacity:0}to{transform:scale(1);opacity:1}}
  #card .icona{font-size:52px;line-height:1;filter:drop-shadow(0 3px 4px rgba(94,42,71,.25))}
  #card h2{font-family:'Baloo 2',cursive;color:var(--prugna);font-size:24px;margin:10px 0 6px}
  #card .testo{color:#4a303f;font-size:15.5px;line-height:1.6;white-space:pre-line}
  #card img{max-width:100%;max-height:38vh;border-radius:12px;margin-top:14px;
    border:3px solid var(--pesca);object-fit:contain}
  #card button{margin-top:18px;background:var(--corallo);border:none;color:#fff;
    font-family:'Baloo 2',cursive;font-weight:800;font-size:16px;padding:11px 28px;
    border-radius:999px;cursor:pointer;box-shadow:0 4px 12px rgba(232,137,107,.4)}
  #card button:active{transform:scale(.95)}

  /* ---------- Finale ---------- */
  #finale{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
    background:rgba(20,8,14,.78);backdrop-filter:blur(5px);padding:18px;overflow:hidden}
  #finale.show{display:flex}
  #finale .box{position:relative;z-index:2;background:linear-gradient(160deg,var(--crema),#f7e3d3);
    border:3px solid var(--rosa);border-radius:22px;width:min(480px,100%);text-align:center;
    padding:34px 26px 26px;animation:pop .45s cubic-bezier(.34,1.56,.64,1)}
  #finale .px{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--rosa);
    letter-spacing:1px;margin-bottom:14px}
  #finale h2{font-family:'Baloo 2',cursive;color:var(--prugna);font-size:28px;margin-bottom:10px}
  #finale .testo{color:#4a303f;font-size:16px;line-height:1.65;white-space:pre-line}
  #finale button{margin-top:20px;background:var(--rosa);border:none;color:#fff;
    font-family:'Baloo 2',cursive;font-weight:800;font-size:16px;padding:12px 30px;
    border-radius:999px;cursor:pointer}
  .fh{position:absolute;z-index:1;top:-40px;font-size:22px;animation:fall linear infinite;pointer-events:none}
  @keyframes fall{to{transform:translateY(115vh) rotate(40deg)}}

  /* ---------- Toast ---------- */
  #toast{position:fixed;left:50%;transform:translateX(-50%) translateY(-8px);
    top:calc(56px + env(safe-area-inset-top));z-index:45;background:rgba(30,14,22,.92);
    color:var(--crema);border:2px solid var(--pesca);border-radius:999px;padding:10px 20px;
    font-size:14.5px;opacity:0;transition:opacity .4s, transform .4s;pointer-events:none;
    max-width:calc(100vw - 30px);text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- Caricamento ---------- */
  #load{position:fixed;inset:0;z-index:100;background:#0a0708;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:18px;transition:opacity .8s}
  #load.hide{opacity:0;pointer-events:none}
  #load .cuore{font-size:44px;animation:beat 1s infinite}
  @keyframes beat{0%,100%{transform:scale(1)}25%{transform:scale(1.25)}45%{transform:scale(1)}}
  #load .t{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--pesca);letter-spacing:2px}
  #dbg-pos{position:fixed;left:14px;bottom:14px;z-index:80;font-family:monospace;font-size:12px;
    color:#8f8;background:rgba(0,0,0,.6);padding:4px 8px;border-radius:6px;display:none}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hearts"></div>
<div id="btns">
  <button id="mute" title="Musica">🔊</button>
  <button id="fs" title="Schermo intero">⛶</button>
</div>
<div id="hint"></div>
<button id="action">❤</button>

<div id="dialog"><span class="name"></span><div class="text"></div><div class="next">▼</div></div>

<div id="veil"><div id="card">
  <div class="icona"></div><h2></h2><div class="testo"></div>
  <img alt="" style="display:none"><br><button>Chiudi&nbsp;&nbsp;❤</button>
</div></div>

<div id="finale"><div class="box">
  <div class="px">SEMPREADDUE</div><h2></h2><div class="testo"></div>
  <button>Restiamo qui ❤</button>
</div></div>

<div id="toast"></div>
<div id="load"><div class="cuore">❤️</div><div class="t">CARICAMENTO...</div></div>
<div id="dbg-pos"></div>

    const n=this.ctx.sampleRate*dur, b=this.ctx.createBuffer(1,n,this.ctx.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
    const s=this.ctx.createBufferSource(); s.buffer=b;
    const f=this.ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=350;
    const g=this.ctx.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
    s.connect(f); f.connect(g); g.connect(this.ctx.destination); s.start(t); s.stop(t+dur); }
  sfx(type){ if(this.muted) return; this.init(); const now=this.ctx.currentTime;
    if(type==='click'){ this.tone(880,.05,'square',.06,now); }
    else if(type==='item'){ this.tone(523.25,.06,'square',.08,now); this.tone(659.25,.06,'square',.08,now+.06);
      this.tone(783.99,.06,'square',.08,now+.12); this.tone(1046.5,.12,'square',.12,now+.18); }
    else if(type==='meow'){ this.tone(620,.10,'triangle',.10,now); this.tone(880,.16,'triangle',.08,now+.08); }
    else if(type==='step'){ this.tone(190,.03,'triangle',.022,now); }
    else if(type==='fanfare'){ const t=.14;
      this.tone(523.25,t,'square',.12,now); this.tone(659.25,t,'square',.12,now+t);
      this.tone(783.99,t,'square',.12,now+t*2); this.tone(1046.5,t*2,'square',.15,now+t*3);
      this.tone(880,t,'square',.12,now+t*5); this.tone(1046.5,t*3,'square',.15,now+t*6);
      this.tone(659.25,t*3,'triangle',.12,now+t*6); this.tone(523.25,t*3,'triangle',.10,now+t*6); } }
  start(){ if(this.muted||this.isPlaying) return; this.init(); this.isPlaying=true;
    let mi=0,hi=0,bi=0,ai=0;
    let tm=this.ctx.currentTime+.1, th=tm, tb=tm, ta=tm;
    const chans=[
      [this.melody, ()=>tm, v=>tm=v, ()=>mi, v=>mi=v, 'square', .04, .02],
      [this.harmony,()=>th, v=>th=v, ()=>hi, v=>hi=v, 'square', .025,.02],
      [this.bass,   ()=>tb, v=>tb=v, ()=>bi, v=>bi=v, 'triangle',.06, .01],
      [this.arp,    ()=>ta, v=>ta=v, ()=>ai, v=>ai=v, 'sine',  .015,.01],
    ];
    const loop=()=>{ if(!this.isPlaying) return;
      const now=this.ctx.currentTime, ahead=.3;
      for(const [notes,gt,st,gi,si,type,vol,gap] of chans){
        let t=gt(), i=gi();
        while(t<now+ahead){ const nt=notes[i], dur=nt[2]*this.beat;
          if(nt[0]) this.tone(this.f(nt[0],nt[1]), dur-gap, type, vol, t);
          t+=dur; i=(i+1)%notes.length; }
        st(t); si(i); }
      this.timer=setTimeout(loop,100); };
    loop(); }
  stop(){ this.isPlaying=false; if(this.timer){clearTimeout(this.timer); this.timer=null;} }
  toggle(){ this.muted=!this.muted;
    if(this.muted) this.stop(); else { this.init(); this.start(); }
    return this.muted; }
}
const audio = new ChiptuneAudio();

/* ============================================================
   MOTORE
   ============================================================ */
const W = 1254;                       // lato stanza in px mondo
const PCT = W/100;                    // 1% in px mondo
const CHAR_H = 25.6*PCT;              // altezza personaggi (~321px)
const SPEED = 24*PCT;                 // velocità in px mondo / s
const WALK_FPS = 9;                   // frame animazione camminata
const R = 0.8;                        // raggio corpo per collisioni (in %)
const DEBUG = new URLSearchParams(location.search).has('debug');

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const isTouch = matchMedia('(pointer:coarse)').matches;

/* ---------- caricamento immagini ---------- */
const IMG = {};
let toLoad = 0;
for(const k in ASSETS){
  toLoad++;
  const im = new Image();
  im.onload = ()=>{ if(--toLoad===0) begin(); };
  im.src = ASSETS[k].src;
  IMG[k] = im;
}

/* ---------- geometria collisioni (in %) ---------- */
function pointInPoly(px,py,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i][0],yi=pts[i][1],xj=pts[j][0],yj=pts[j][1];
    if(((yi>py)!==(yj>py)) && (px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function distToSeg(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  let t=l2?((px-ax)*dx+(py-ay)*dy)/l2:0;
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(ax+t*dx), py-(ay+t*dy));
}
function nearPoly(px,py,pts,m){
  for(let i=0,j=pts.length-1;i<pts.length;j=i++)
    if(distToSeg(px,py,pts[j][0],pts[j][1],pts[i][0],pts[i][1])<m) return true;
  return false;
}
function blocked(px,py){
  for(const c of COLLIDERS){
    if(pointInPoly(px,py,c.pts)) return true;
    if(nearPoly(px,py,c.pts,R)) return true;
  }
  if(px<1.5||px>98||py<14||py>98) return true;
  // lui è un ostacolo morbido
  if(Math.hypot(px-npc.x, py-npc.y)<2.4) return true;
  return false;
}
const inBehind = (px,py)=>pointInPoly(px,py,BEHIND_BED);

/* ---------- stato di gioco ---------- */
const player = {
  x:CONFIG.posizioni.lei.x, y:CONFIG.posizioni.lei.y,
  vx:0, vy:0, dir:'down', moving:false, animT:0, stepAcc:0,
};
const npc = { x:CONFIG.posizioni.lui.x, y:CONFIG.posizioni.lui.y, talked:false };
const cat = { ...CONFIG.gatto, awakeUntil:0 };
const found = CONFIG.sorprese.map(()=>false);
let frozen = false;          // input bloccato (dialoghi/modali)
let finaleShown = false;
let clock = 0;

/* ---------- camera ---------- */
let vw=0, vh=0, dpr=1, S=1, followMode=false, camX=0, camY=0, camInit=false;
function resize(){
  vw=innerWidth; vh=innerHeight;
  dpr=Math.min(devicePixelRatio||1, 2.5);
  canvas.width=Math.round(vw*dpr); canvas.height=Math.round(vh*dpr);
  const fit=Math.min(vw/W, vh/W);
  if(CHAR_H*fit < 150){ S=Math.max(vw/W, vh/W); followMode=true; }
  else { S=fit; followMode=false; }
  camInit=false;
}
addEventListener('resize', resize);
function camTarget(axis){
  const view = (axis==='x'?vw:vh)/S;
  if(view>=W) return (W-view)/2;
  const p=(axis==='x'?player.x:player.y)*PCT;
  return Math.max(0, Math.min(W-view, p-view/2));
}
function updateCam(dt){
  const tx=camTarget('x'), ty=camTarget('y');
  if(!camInit){ camX=tx; camY=ty; camInit=true; return; }
  const k=Math.min(1, dt*5);
  camX+=(tx-camX)*k; camY+=(ty-camY)*k;
}
const sx = wx=>(wx-camX)*S;   // mondo px -> schermo
const sy = wy=>(wy-camY)*S;

/* ---------- input tastiera ---------- */
const keys={};
addEventListener('keydown', e=>{
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
  keys[e.key.toLowerCase()]=true;
  if(e.key==='e'||e.key==='E'||e.key===' '||e.key==='Enter') pressInteract();
  if(e.key==='Escape') closeAll();
  firstGesture();
});
addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

/* ---------- joystick virtuale ---------- */
const joy={active:false,id:null,ox:0,oy:0,dx:0,dy:0,t0:0,moved:false};
const JOY_R=52;
canvas.addEventListener('pointerdown', e=>{
  firstGesture();
  if(frozen) return;
  if(joy.active) return;
  joy.active=true; joy.id=e.pointerId;
  joy.ox=e.clientX; joy.oy=e.clientY; joy.dx=0; joy.dy=0;
  joy.t0=performance.now(); joy.moved=false;
  canvas.setPointerCapture(e.pointerId);
  if(DEBUG){
    const wx=(e.clientX/S+camX)/PCT, wy=(e.clientY/S+camY)/PCT;
    console.log(`[debug] click a x:${wx.toFixed(1)} y:${wy.toFixed(1)}`);
    document.getElementById('dbg-pos').textContent=`x:${wx.toFixed(1)} y:${wy.toFixed(1)}`;
  }
});
canvas.addEventListener('pointermove', e=>{
  if(!joy.active||e.pointerId!==joy.id) return;
  joy.dx=e.clientX-joy.ox; joy.dy=e.clientY-joy.oy;
  if(Math.hypot(joy.dx,joy.dy)>12) joy.moved=true;
  const len=Math.hypot(joy.dx,joy.dy);
  if(len>JOY_R){ joy.dx*=JOY_R/len; joy.dy*=JOY_R/len; }
});
function joyEnd(e){
  if(!joy.active||e.pointerId!==joy.id) return;
  const quick=performance.now()-joy.t0<280 && !joy.moved;
  joy.active=false; joy.dx=0; joy.dy=0;
  if(quick) pressInteract();   // tap veloce = interagisci
}
canvas.addEventListener('pointerup', joyEnd);
canvas.addEventListener('pointercancel', joyEnd);

/* ---------- interattivi ---------- */
function interactives(){
  const list=[];
  CONFIG.sorprese.forEach((s,i)=>list.push({tipo:'sorpresa', i, x:s.x, y:s.y, r:s.raggio||12, icona:s.icona}));
  list.push({tipo:'npc', x:npc.x, y:npc.y, r:10, icona:'💬'});
  list.push({tipo:'gatto', x:cat.x, y:cat.y, r:11, icona:'🐾'});
  return list;
}
function nearestTarget(){
  let best=null, bd=1e9;
  for(const it of interactives()){
    const d=Math.hypot(player.x-it.x, player.y-it.y);
    if(d<it.r && d<bd){ bd=d; best=it; }
  }
  return best;
}
let target=null;

function pressInteract(){
  if(frozen){ advanceDialog(); return; }
  if(!target) return;
  if(target.tipo==='sorpresa') openSorpresa(target.i);
  else if(target.tipo==='npc') openDialog();
  else if(target.tipo==='gatto') pokeCat();
}

/* ---------- dialogo NPC ---------- */

/* ---------- gatto ---------- */

/* ---------- sorprese ---------- */
const veil=document.getElementById('veil'), card=document.getElementById('card');

/* ---------- HUD ---------- */
function updateHearts(){

}
document.getElementById('mute').addEventListener('click', function(e){

document.getElementById('action').addEventListener('pointerdown', e=>{

/* ---------- particelle cuore ---------- */
const parts=[];
function burst(px,py,n){
  for(let i=0;i<n;i++)
    parts.push({x:px+(Math.random()-.5)*4, y:py+(Math.random()-.5)*2,
      vy:-(4+Math.random()*5), sway:Math.random()*Math.PI*2, life:1});
}

/* ---------- musica al primo gesto ---------- */
let started=false;
function firstGesture(){
  if(started) return; started=true;
  if(CONFIG.musica) { audio.init(); audio.start(); }
}

/* ---------- update ---------- */
function update(dt){
  clock+=dt;
  // input -> velocità
  let mx=0,my=0;
  if(!frozen){
    if(keys['w']||keys['arrowup'])    my-=1;
    if(keys['s']||keys['arrowdown']) my+=1;
    if(keys['a']||keys['arrowleft']) mx-=1;
    if(keys['d']||keys['arrowright'])mx+=1;
    if(joy.active){
      const len=Math.hypot(joy.dx,joy.dy);
      if(len>10){ mx=joy.dx/JOY_R; my=joy.dy/JOY_R; }
    }
  }
  const len=Math.hypot(mx,my);
  player.moving=len>0.01;
  if(player.moving){
    const nx=mx/Math.max(1,len), ny=my/Math.max(1,len);
    const sp=SPEED*Math.min(1,len)/PCT*dt;   // in %
    const px=player.x+nx*sp, py=player.y+ny*sp;
    if(!blocked(px,player.y)) player.x=px;
    if(!blocked(player.x,py)) player.y=py;
    // direzione (dominante, con isteresi)
    const ax=Math.abs(nx), ay=Math.abs(ny);
    if(ax>ay*1.15) player.dir=nx<0?'left':'right';
    else if(ay>ax*1.15) player.dir=ny<0?'up':'down';
    player.animT+=dt;
    // passi
    player.stepAcc+=sp;
    if(player.stepAcc>3.6){ player.stepAcc=0; audio.sfx('step'); }
  } else player.animT=0;

  // bersaglio interazione + bottone azione
  target=frozen?null:nearestTarget();
  const ab=document.getElementById('action');
  if(target){ ab.textContent=target.tipo==='sorpresa'?'❤':target.icona; ab.classList.add('show'); }
  else ab.classList.remove('show');

  // particelle
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.y+=p.vy*dt; p.x+=Math.sin(clock*4+p.sway)*1.6*dt; p.life-=dt*.55;
    if(p.life<=0) parts.splice(i,1);
  }
  updateCam(dt);
}

/* ---------- disegno ---------- */
function drawSprite(sp,img,frame,wxPct,wyPct,hWorld,flip,alpha,dy){
  const s=hWorld/sp.fh, dw=sp.fw*s*S, dh=hWorld*S;
  const dx=sx(wxPct*PCT), dyy=sy(wyPct*PCT)+(dy||0)*S;
  ctx.save();
  ctx.globalAlpha=alpha;
  if(flip){ ctx.translate(dx,0); ctx.scale(-1,1); ctx.translate(-dx,0); }
  ctx.drawImage(img, frame*sp.fw,0,sp.fw,sp.fh, dx-dw/2, dyy-dh, dw, dh);
  ctx.restore();
}
function drawShadow(wxPct,wyPct,wWorld,alpha){
  const cx=sx(wxPct*PCT), cy=sy(wyPct*PCT), rx=wWorld*.38*S, ry=rx*.32;
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rx);
  g.addColorStop(0,`rgba(0,0,0,${.4*alpha})`); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.save(); ctx.translate(cx,cy); ctx.scale(1,ry/rx); ctx.translate(-cx,-cy);
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,rx,0,Math.PI*2); ctx.fill(); ctx.restore();
}
function playerSprite(){
  const d=player.dir, m=player.moving;
  let sp,img,frame=0,flip=false,dy=0;
  if(d==='up'){ sp=ASSETS.leiBack; img=IMG.leiBack; frame=m?Math.floor(player.animT*WALK_FPS)%sp.n:0; }
  else if(d==='left'||d==='right'){ sp=ASSETS.leiSide; img=IMG.leiSide;
    frame=m?Math.floor(player.animT*WALK_FPS)%sp.n:0; flip=(d==='right'); }
  else { sp=ASSETS.leiIdle; img=IMG.leiIdle;
    dy = m ? Math.abs(Math.sin(player.animT*Math.PI*WALK_FPS/2))*-6
           : Math.sin(clock*1.8)*-1.2; }   // respiro da ferma
  return {sp,img,frame,flip,dy};
}

function render(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle='#0a0708'; ctx.fillRect(0,0,vw,vh);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';

  // stanza
  ctx.drawImage(IMG.bg, sx(0), sy(0), W*S, W*S);

  // debug hitbox
  if(DEBUG){
    ctx.lineWidth=1.5;
    for(const c of COLLIDERS){
      ctx.beginPath();
      c.pts.forEach((p,i)=>i?ctx.lineTo(sx(p[0]*PCT),sy(p[1]*PCT)):ctx.moveTo(sx(p[0]*PCT),sy(p[1]*PCT)));
      ctx.closePath(); ctx.fillStyle='rgba(255,80,80,.22)'; ctx.fill();
      ctx.strokeStyle='rgba(255,120,120,.8)'; ctx.stroke();
    }
    ctx.beginPath();
    BEHIND_BED.forEach((p,i)=>i?ctx.lineTo(sx(p[0]*PCT),sy(p[1]*PCT)):ctx.moveTo(sx(p[0]*PCT),sy(p[1]*PCT)));
    ctx.closePath(); ctx.fillStyle='rgba(80,140,255,.25)'; ctx.fill();
    for(const it of interactives()){
      ctx.beginPath(); ctx.arc(sx(it.x*PCT),sy(it.y*PCT),it.r*PCT*S,0,Math.PI*2);
      ctx.strokeStyle='rgba(120,255,120,.5)'; ctx.stroke();
    }
    document.getElementById('dbg-pos').style.display='block';
  }

  // indicatori sorprese
  ctx.textAlign='center'; ctx.textBaseline='middle';
  CONFIG.sorprese.forEach((s,i)=>{
    const pulse=.65+.35*Math.sin(clock*3+i);
    const size=(found[i]?13:16)+(found[i]?0:Math.sin(clock*3+i)*2);
    ctx.save();
    ctx.globalAlpha=found[i]?.4:pulse;
    ctx.font=`${size*S/0.55}px serif`;
    ctx.fillText(found[i]?'❤':'✨', sx(s.x*PCT), sy(s.y*PCT)-Math.sin(clock*2+i)*3*S);
    ctx.restore();
  });

  // entità ordinate per profondità (piedi più in basso = davanti)
  const ents=[];
  // gatto
  const catFrame=clock<cat.awakeUntil?1:0;
  ents.push({y:cat.y, draw(){
    const wW=cat.larghezza*PCT, sc=wW/ASSETS.gatto.fw, hW=ASSETS.gatto.fh*sc;
    drawShadow(cat.x, cat.y, wW*.8, .8);
    drawSprite(ASSETS.gatto, IMG.gatto, catFrame, cat.x, cat.y, hW, false, 1, 0);
  }});
  // lui (npc)
  ents.push({y:npc.y, draw(){
    const a=inBehind(npc.x,npc.y)?.45:1;
    drawShadow(npc.x, npc.y, CHAR_H*.42, a);
    const dy=Math.sin(clock*1.6)*-1.2;
    drawSprite(ASSETS.luiIdle, IMG.luiIdle, 0, npc.x, npc.y, CHAR_H*.97, false, a, dy);
    if(!npc.talked){ // richiamo sopra la testa
      ctx.save(); ctx.globalAlpha=.9; ctx.font=`${15*S/0.55}px serif`;
      ctx.fillText('💬', sx(npc.x*PCT), sy(npc.y*PCT)-(CHAR_H*1.06)*S-Math.sin(clock*2.5)*4*S);
      ctx.restore(); }
  }});
  // lei (player)
  ents.push({y:player.y, draw(){
    const a=inBehind(player.x,player.y)?.45:1;
    const {sp,img,frame,flip,dy}=playerSprite();
    drawShadow(player.x, player.y, CHAR_H*.42, a);
    drawSprite(sp, img, frame, player.x, player.y, CHAR_H, flip, a, dy);
  }});
  ents.sort((a,b)=>a.y-b.y).forEach(e=>e.draw());

  // particelle
  for(const p of parts){
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.font=`${12*S/0.55}px serif`;
    ctx.fillText('❤️', sx(p.x*PCT), sy(p.y*PCT));
    ctx.restore();
  }

  // joystick
  if(joy.active&&joy.moved){
    ctx.save();
    ctx.globalAlpha=.35;
    ctx.beginPath(); ctx.arc(joy.ox,joy.oy,JOY_R,0,Math.PI*2);
    ctx.fillStyle='#FBF3E9'; ctx.fill();
    ctx.globalAlpha=.6;
    ctx.beginPath(); ctx.arc(joy.ox+joy.dx,joy.oy+joy.dy,24,0,Math.PI*2);
    ctx.fillStyle='#E8896B'; ctx.fill();
    ctx.restore();
  }
}

/* ---------- loop ---------- */
let last=0;
function loop(t){
  const dt=Math.min(.05,(t-last)/1000||0); last=t;
  update(dt); render();
  requestAnimationFrame(loop);
}

function begin(){
  resize(); updateHearts();
  document.title=CONFIG.titolo;
  document.getElementById('hint').textContent =
    isTouch ? 'Trascina per muoverti · tocca ❤'
            : 'WASD / frecce per muoverti · E per interagire';
  setTimeout(()=>document.getElementById('hint').classList.add('hide'), 7000);
  document.getElementById('load').classList.add('hide');
  requestAnimationFrame(loop);
}
</script>
